version: '3'

tasks:
  build:
    desc: Build in release mode
    cmds:
      - cargo build --release

  test:
    desc: Run all tests
    cmds:
      - cargo test

  check:
    desc: Check compilation
    cmds:
      - cargo check

  check:cfg:
    desc: Validate all cfg() conditions reference known values
    cmds:
      - cargo check -q 2>&1
      - cargo clippy -q -- -W unexpected_cfgs 2>&1

  release:
    desc: How to cut a release (handled by GitHub Actions)
    silent: true
    cmds:
      - |
        echo "Releases are automated:"
        echo "  patch        -> auto-shipped on every merge to main"
        echo "  minor/major/rc -> Actions > Release > Run workflow (choose level)"

  lint:
    desc: Run formatter and clippy
    cmds:
      - cargo fmt
      - cargo clippy -- -D warnings

  hooks:install:
    desc: Install git hooks from .githooks/
    cmds:
      - git config core.hooksPath .githooks

  version:
    desc: Show current version from Cargo.toml
    cmds:
      - grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/'
    silent: true
